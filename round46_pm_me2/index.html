<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME技術実力検定試験</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222535; --border:#2e3248;
    --accent:#4f8ef7; --accent2:#7c6af7;
    --correct:#2ecc71; --wrong:#e74c3c; --unanswered:#f39c12;
    --text:#e8eaf6; --text-dim:#8890b5; --text-muted:#555c7a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* TOP BAR */
  .topbar { position:sticky; top:0; z-index:100; background:rgba(15,17,23,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .topbar-title { font-family:'Noto Serif JP',serif; font-size:13px; color:var(--text-dim); white-space:nowrap; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .progress-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; max-width:240px; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width 0.4s ease; width:0%; }
  .progress-label { font-size:12px; color:var(--text-dim); white-space:nowrap; }
  .timer-display { font-size:13px; font-weight:700; color:var(--accent); white-space:nowrap; font-variant-numeric:tabular-nums; }

  /* LANG TOGGLE */
  .lang-toggle { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
  .lang-btn { padding:5px 12px; background:transparent; border:none; color:var(--text-muted); font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .lang-btn.active { background:var(--accent); color:#fff; }
  .lang-btn:hover:not(.active) { color:var(--accent); }

  /* LAYOUT */
  .layout { display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar { border-right:1px solid var(--border); padding:20px 16px; overflow-y:auto; position:sticky; top:57px; height:calc(100vh - 57px); }
  .sidebar-heading { font-size:10px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; padding-left:4px; }
  .q-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
  .q-btn { aspect-ratio:1; border:1px solid var(--border); background:var(--surface); border-radius:6px; font-size:10px; color:var(--text-dim); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; font-family:'Noto Sans JP',sans-serif; }
  .q-btn:hover { border-color:var(--accent); color:var(--accent); }
  .q-btn.current { border-color:var(--accent); background:rgba(79,142,247,0.15); color:var(--accent); font-weight:700; }
  .q-btn.scored-correct { background:rgba(46,204,113,0.15); border-color:var(--correct); color:var(--correct); }
  .q-btn.scored-wrong   { background:rgba(231,76,60,0.15);  border-color:var(--wrong);   color:var(--wrong); }
  .q-btn.in-progress    { border-color:var(--unanswered); color:var(--unanswered); }
  .sidebar-score { margin-top:20px; padding:14px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
  .score-row { display:flex; justify-content:space-between; font-size:15px; color:var(--text-dim); margin-bottom:6px; }
  .score-row:last-child { margin-bottom:0; }
  .score-val { font-weight:700; }
  .score-val.c{color:var(--correct);} .score-val.w{color:var(--wrong);} .score-val.u{color:var(--unanswered);}
  .btn-result { margin-top:14px; width:100%; padding:10px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
  .btn-result:hover { opacity:0.85; }
  .btn-reset { margin-top:8px; width:100%; padding:8px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-family:'Noto Sans JP',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s; }
  .btn-reset:hover { border-color:var(--accent); color:var(--accent); }

  /* MAIN */
  .main { padding:40px 48px; max-width:820px; }
  .q-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .q-number { font-size:11px; letter-spacing:2px; color:var(--accent); text-transform:uppercase; font-weight:500; }
  .q-image-badge { font-size:10px; padding:2px 8px; background:rgba(243,156,18,0.15); border:1px solid var(--unanswered); border-radius:10px; color:var(--unanswered); }
  .q-text { font-family:'Noto Serif JP',serif; font-size:17px; line-height:1.9; color:var(--text); margin-bottom:16px; font-weight:600; white-space:pre-wrap; }
  .q-image { margin-bottom:20px; }
  .q-image img { max-width:100%; border-radius:10px; border:1px solid var(--border); }
  .q-image-placeholder { padding:18px 20px; background:var(--surface2); border:1px dashed var(--unanswered); border-radius:10px; font-size:13px; color:var(--unanswered); display:flex; align-items:center; gap:10px; }
  .q-hint { font-size:12px; color:var(--text-muted); margin-bottom:16px; padding:8px 14px; background:var(--surface2); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; }

  /* NO TRANSLATION NOTICE */
  .no-trans { font-size:12px; color:var(--unanswered); margin-bottom:12px; padding:8px 14px; background:rgba(243,156,18,0.08); border:1px solid rgba(243,156,18,0.3); border-radius:6px; display:none; }

  /* CHOICES */
  .choices { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
  .choice-item { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; transition:all 0.15s; cursor:pointer; }
  .choice-item:hover:not(.locked) { border-color:var(--accent); background:rgba(79,142,247,0.07); }
  .choice-item.selected { border-color:var(--accent); background:rgba(79,142,247,0.12); }
  .choice-item.locked { cursor:default; pointer-events:none; }
  .choice-item.reveal-correct { border-color:var(--correct); background:rgba(46,204,113,0.07); }
  .choice-item.reveal-wrong   { border-color:var(--wrong);   background:rgba(231,76,60,0.07); }
  .choice-item.reveal-missed  { border-color:var(--unanswered); background:rgba(243,156,18,0.07); }
  .choice-check { width:24px; height:24px; border-radius:6px; border:2px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; transition:all 0.15s; }
  .choice-item.selected .choice-check { border-color:var(--accent); background:var(--accent); }
  .choice-item.reveal-correct .choice-check { border-color:var(--correct); background:var(--correct); }
  .choice-item.reveal-wrong   .choice-check { border-color:var(--wrong); background:var(--wrong); }
  .choice-check svg { display:none; }
  .choice-item.selected .choice-check svg,
  .choice-item.reveal-correct .choice-check svg,
  .choice-item.reveal-wrong   .choice-check svg { display:block; }
  .choice-num { min-width:26px; height:26px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text-dim); flex-shrink:0; margin-top:1px; }
  .choice-text { font-size:17px; line-height:1.75; color:var(--text); flex:1; }
  .result-icon { min-width:28px; height:28px; border-radius:50%; display:none; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; margin-top:2px; }
  .result-icon.show { display:flex; }
  .result-icon.ok  { background:rgba(46,204,113,0.2); color:var(--correct); }
  .result-icon.ng  { background:rgba(231,76,60,0.2);  color:var(--wrong); }
  .result-icon.miss{ background:rgba(243,156,18,0.2); color:var(--unanswered); }

  /* SCORE BUTTON */
  .score-area { margin-bottom:32px; }
  .btn-score { padding:12px 32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:10px; color:#fff; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
  .btn-score:hover:not(:disabled) { opacity:0.85; }
  .btn-score:disabled { opacity:0.35; cursor:default; }
  .score-msg { margin-top:12px; font-size:19px; color:var(--text-dim); min-height:24px; line-height:1.6; }
  .score-msg.correct-msg { color:var(--correct); font-weight:700; }
  .score-msg.wrong-msg   { color:var(--wrong);   font-weight:700; }

  /* NAV */
  .nav-row { display:flex; gap:12px; align-items:center; }
  .nav-btn { padding:10px 22px; border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); }
  .nav-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .nav-btn:disabled { opacity:0.3; cursor:default; }
  .nav-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; }
  .nav-btn.primary:hover:not(:disabled) { opacity:0.85; color:#fff; border-color:transparent; }

  /* START SCREEN */
  .start-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 57px); padding:40px; }
  .start-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:480px; }
  .start-title { font-family:'Noto Serif JP',serif; font-size:20px; font-weight:700; margin-bottom:6px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .start-subtitle { font-size:13px; color:var(--text-muted); margin-bottom:28px; }
  .form-group { margin-bottom:18px; }
  .form-label { font-size:12px; color:var(--text-dim); margin-bottom:6px; display:block; letter-spacing:1px; }
  .form-input { width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:15px; outline:none; transition:border-color 0.15s; }
  .form-input:focus { border-color:var(--accent); }
  .form-input::placeholder { color:var(--text-muted); }
  .btn-start { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:10px; color:#fff; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:opacity 0.15s; margin-top:8px; }
  .btn-start:hover { opacity:0.85; }
  .btn-start:disabled { opacity:0.35; cursor:default; }

  /* RESULT */
  .result-screen { display:none; padding:40px 48px; max-width:820px; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .result-title { font-family:'Noto Serif JP',serif; font-size:26px; font-weight:700; margin-bottom:8px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .result-big { font-size:64px; font-weight:700; line-height:1; margin-bottom:6px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .result-sub { font-size:14px; color:var(--text-dim); margin-bottom:8px; }
  .result-time { font-size:14px; color:var(--accent); margin-bottom:28px; }
  .result-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:36px; }
  .result-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
  .result-card .rc-num { font-size:36px; font-weight:700; margin-bottom:4px; }
  .result-card .rc-label { font-size:11px; color:var(--text-muted); letter-spacing:1px; }
  .rc-num.c{color:var(--correct);} .rc-num.w{color:var(--wrong);} .rc-num.u{color:var(--unanswered);}
  .result-review { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:28px; }
  .result-review-header { padding:14px 20px; border-bottom:1px solid var(--border); font-size:12px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; }
  .result-review-list { max-height:320px; overflow-y:auto; }
  .review-row { display:flex; align-items:center; padding:10px 20px; border-bottom:1px solid var(--border); gap:12px; font-size:13px; cursor:pointer; transition:background 0.15s; }
  .review-row:last-child { border-bottom:none; }
  .review-row:hover { background:var(--surface2); }
  .review-row .rr-num { color:var(--text-muted); min-width:60px; }
  .review-row .rr-status { min-width:40px; font-weight:700; }
  .review-row .rr-status.c{color:var(--correct);} .review-row .rr-status.w{color:var(--wrong);} .review-row .rr-status.u{color:var(--unanswered);}
  .review-row .rr-text { color:var(--text-dim); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .result-actions { display:flex; gap:12px; flex-wrap:wrap; }
  .btn-send { padding:12px 28px; background:linear-gradient(135deg,#2ecc71,#27ae60); border:none; border-radius:10px; color:#fff; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
  .btn-send:hover:not(:disabled) { opacity:0.85; }
  .btn-send:disabled { opacity:0.5; cursor:default; }
  .send-msg { margin-top:12px; font-size:14px; min-height:20px; }
  .send-msg.ok  { color:var(--correct); font-weight:700; }
  .send-msg.err { color:var(--wrong); }

  /* LOADING/ERROR */
  .screen-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; text-align:center; padding:40px; }
  .screen-center .icon { font-size:48px; }
  .screen-center h2 { font-family:'Noto Serif JP',serif; font-size:20px; color:var(--text); }
  .screen-center p { font-size:14px; color:var(--text-dim); line-height:1.8; max-width:480px; }
  .screen-center code { font-size:12px; background:var(--surface2); padding:2px 8px; border-radius:4px; color:var(--accent); }

  @media (max-width:700px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
    .main,.result-screen { padding:24px 20px; }
    .topbar { flex-wrap:wrap; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="topbarTitle">ME技術実力検定試験</div>
  <div class="topbar-right">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">— / —</div>
    <div class="timer-display" id="timerDisplay" style="display:none">⏱ 00:00:00</div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnJa" onclick="setLang('ja')">JP</button>
      <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-heading" id="sb-heading">問題一覧</div>
    <div class="q-grid" id="qGrid"></div>
    <div class="sidebar-score">
      <div class="score-row"><span id="sb-correct">正解</span><span class="score-val c" id="scoreCorrect">0</span></div>
      <div class="score-row"><span id="sb-wrong">不正解</span><span class="score-val w" id="scoreWrong">0</span></div>
      <div class="score-row"><span id="sb-unscored">未採点</span><span class="score-val u" id="scoreUnanswered">—</span></div>
    </div>
    <button class="btn-result" id="sb-btn-result" onclick="showResult()">結果を見る</button>
    <button class="btn-reset"  id="sb-btn-reset"  onclick="resetAll()">最初からやり直す</button>
  </aside>

  <div id="mainArea">
    <div class="screen-center" id="loadingScreen">
      <div class="icon">⏳</div>
      <h2>データを読み込み中...</h2>
    </div>
  </div>
</div>

<script>
// =============================================
//  設定
// =============================================
const JSON_FILE = 'round46_pm.json';
const IMAGE_DIR = 'images/';
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbyguUSm5x9JoTNUhrxNztVrtsbcISPOXDxAzIMsFjOTI-pVt2DnGSLoa62wEy6r3ObP/exec';

// =============================================
//  多言語テキスト定義
// =============================================
const I18N = {
  ja: {
    loading:        'データを読み込み中...',
    sbHeading:      '問題一覧',
    sbCorrect:      '正解',
    sbWrong:        '不正解',
    sbUnscored:     '未採点',
    sbBtnResult:    '結果を見る',
    sbBtnReset:     '最初からやり直す',
    namLabel:       '氏名',
    idLabel:        '学籍番号 / 識別番号（英数字）',
    namPh:          '例）山田 太郎',
    idPh:           '例）ME2024001',
    btnStart:       '開始する',
    hint:           (n) => `正解と思う選択肢を選んでください。（${n}つ選択）`,
    noTrans:        '※ この問題の英訳は準備中です。日本語で表示しています。',
    btnScore:       '採点する',
    scored:         '採点済み',
    selectMore:     (n) => `${n}つ選択してください`,
    selectMoreLeft: (n) => `あと ${n} つ選択してください`,
    correct:        (t) => `✓ 正解！　正答: ${t}`,
    wrong:          (t) => `✗ 不正解　正答: ${t}`,
    btnPrev:        '← 前の問題',
    btnNext:        '次の問題 →',
    btnLast:        '最後の問題',
    resultTitle:    '結果発表',
    resultCorrect:  '正解',
    resultWrong:    '不正解',
    resultUnscored: '未採点',
    resultTime:     (t) => `⏱ 解答時間: ${t}`,
    reviewHeader:   '問題別結果（クリックで問題へ）',
    btnBack:        '問題に戻る',
    btnSend:        '結果を送信する',
    btnSent:        '送信済み',
    sending:        '送信中...',
    sendOk:         '✓ 送信しました',
    sendErr:        '送信に失敗しました。もう一度お試しください。',
    confirmSend:    (n,i) => `結果を送信してよいですか？\n\n氏名: ${n}\n学籍番号: ${i}`,
    confirmReset:   '最初からやり直しますか？\n（問題順・選択肢順が再シャッフルされます）',
    statusNone:     '未',
    statusOk:       '○',
    statusNg:       '×',
    imgNotFound:    (f) => `⚠️ 画像ファイルが見つかりません: ${f}`,
  },
  en: {
    loading:        'Loading data...',
    sbHeading:      'Questions',
    sbCorrect:      'Correct',
    sbWrong:        'Incorrect',
    sbUnscored:     'Unscored',
    sbBtnResult:    'View Results',
    sbBtnReset:     'Start Over',
    namLabel:       'Full Name',
    idLabel:        'Student ID / Identifier (alphanumeric)',
    namPh:          'e.g. Taro Yamada',
    idPh:           'e.g. ME2024001',
    btnStart:       'Start',
    hint:           (n) => `Select the correct answer(s). (Choose ${n})`,
    noTrans:        '※ English translation for this question is not yet available. Showing in Japanese.',
    btnScore:       'Check Answer',
    scored:         'Scored',
    selectMore:     (n) => `Please select ${n} answer(s)`,
    selectMoreLeft: (n) => `Please select ${n} more`,
    correct:        (t) => `✓ Correct!　Answer: ${t}`,
    wrong:          (t) => `✗ Incorrect　Answer: ${t}`,
    btnPrev:        '← Previous',
    btnNext:        'Next →',
    btnLast:        'Last Question',
    resultTitle:    'Results',
    resultCorrect:  'Correct',
    resultWrong:    'Incorrect',
    resultUnscored: 'Unscored',
    resultTime:     (t) => `⏱ Time: ${t}`,
    reviewHeader:   'Question Results (click to review)',
    btnBack:        'Back to Questions',
    btnSend:        'Submit Results',
    btnSent:        'Submitted',
    sending:        'Submitting...',
    sendOk:         '✓ Submitted successfully',
    sendErr:        'Submission failed. Please try again.',
    confirmSend:    (n,i) => `Submit your results?\n\nName: ${n}\nID: ${i}`,
    confirmReset:   'Start over?\n(Questions and choices will be reshuffled)',
    statusNone:     '-',
    statusOk:       '○',
    statusNg:       '×',
    imgNotFound:    (f) => `⚠️ Image file not found: ${f}`,
  }
};

// =============================================
//  STATE
// =============================================
let questions  = [];
let userChecks = [];
let scored     = [];
let currentIdx = 0;
let examInfo   = {};
let userName   = '';
let studentId  = '';
let lang       = 'ja';
let timerSeconds  = 0;
let timerInterval = null;

// =============================================
//  LANG
// =============================================
function t(key, ...args) {
  const val = I18N[lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function setLang(l) {
  lang = l;
  document.getElementById('btnJa').classList.toggle('active', l==='ja');
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.documentElement.lang = l==='ja' ? 'ja' : 'en';

  // 起動画面が表示中なら再描画
  if (document.getElementById('inputName')) {
    const savedName = document.getElementById('inputName').value;
    const savedId   = document.getElementById('inputId').value;
    showStartScreen();
    document.getElementById('inputName').value = savedName;
    document.getElementById('inputId').value   = savedId;
    checkStartBtn();
    return;
  }

  // サイドバーの静的テキストを更新
  const ids = { 'sb-heading':'sbHeading','sb-correct':'sbCorrect','sb-wrong':'sbWrong',
                'sb-unscored':'sbUnscored','sb-btn-result':'sbBtnResult','sb-btn-reset':'sbBtnReset' };
  Object.entries(ids).forEach(([id,key]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  });

  // 問題表示中なら再描画
  if (questions.length > 0 && document.getElementById('quizArea')) {
    renderQ(currentIdx);
  }

  // 結果画面が表示中なら再描画
  if (document.getElementById('resultScreen') &&
      document.getElementById('resultScreen').style.display === 'block') {
    showResult();
  }
}

// =============================================
//  TIMER
// =============================================
function startTimer() {
  timerSeconds = 0;
  document.getElementById('timerDisplay').style.display = 'block';
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById('timerDisplay').textContent = '⏱ ' + formatTime(timerSeconds);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
function formatTime(s) {
  const h   = String(Math.floor(s/3600)).padStart(2,'0');
  const m   = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

// =============================================
//  INIT: JSON読み込み
// =============================================
async function loadData() {
  try {
    const res = await fetch(JSON_FILE);
    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
    const data = await res.json();
    examInfo = data.exam || {};
    document.getElementById('topbarTitle').textContent =
      `第${examInfo.round||'?'}回 第２種ME検定 ${examInfo.session||''}`;
    initQuestions(data.questions);
    showStartScreen();
  } catch(err) {
    document.getElementById('mainArea').innerHTML = `
      <div class="screen-center">
        <div class="icon">⚠️</div>
        <h2>データの読み込みに失敗しました</h2>
        <p><code>${JSON_FILE}</code> が見つからないか、読み込めませんでした。<br><br>
        このファイルはWebサーバー上（GitHub Pages等）で動作します。<br>
        エラー詳細: ${err.message}</p>
      </div>`;
  }
}

// =============================================
//  START SCREEN
// =============================================
function showStartScreen() {
  document.getElementById('mainArea').innerHTML = `
    <div class="start-screen">
      <div class="start-card">
        <div class="start-title">第${examInfo.round||'?'}回 第２種ME技術実力検定試験</div>
        <div class="start-subtitle">${examInfo.session||''} 全${examInfo.total||60}問</div>
        <div class="form-group">
          <label class="form-label" id="lbl-name">${t('namLabel')}</label>
          <input class="form-input" id="inputName" type="text" placeholder="${t('namPh')}" oninput="checkStartBtn()">
        </div>
        <div class="form-group">
          <label class="form-label" id="lbl-id">${t('idLabel')}</label>
          <input class="form-input" id="inputId" type="text" placeholder="${t('idPh')}" oninput="checkStartBtn()">
        </div>
        <button class="btn-start" id="btnStart" onclick="startQuiz()" disabled>${t('btnStart')}</button>

function checkStartBtn() {
  const name = document.getElementById('inputName').value.trim();
  const id   = document.getElementById('inputId').value.trim();
  document.getElementById('btnStart').disabled = !(name && id);
}

function startQuiz() {
  userName  = document.getElementById('inputName').value.trim();
  studentId = document.getElementById('inputId').value.trim();
  renderMainArea();
  startTimer();
  renderQ(0);
}

// =============================================
//  SHUFFLE & INIT
// =============================================
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function initQuestions(rawQuestions) {
  const order = shuffle(rawQuestions.map((_,i)=>i));
  questions = order.map(idx => {
    const q  = rawQuestions[idx];
    const ci = q.choices.map((_,i)=>i);
    const si = shuffle(ci);
    const shuffledChoices    = si.map(i=>q.choices[i]);
    const shuffledChoices_en = q.choices_en ? si.map(i=>q.choices_en[i]) : null;
    const origAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
    const newAnswers  = origAnswers.map(a=>si.indexOf(a-1)+1);
    const selectCount = q.select || origAnswers.length;
    return {
      no:         q.no,
      text:       q.text,
      text_en:    q.text_en    || null,
      choices:    shuffledChoices,
      choices_en: shuffledChoices_en,
      image:      q.image||null,
      answer:     newAnswers,
      select:     selectCount
    };
  });
  userChecks = questions.map(()=>new Set());
  scored     = new Array(questions.length).fill(null);
  currentIdx = 0;
}

// =============================================
//  RENDER MAIN AREA
// =============================================
function renderMainArea() {
  document.getElementById('mainArea').innerHTML = `
    <div class="main" id="quizArea">
      <div class="q-meta">
        <div class="q-number" id="qNumber"></div>
        <div class="q-image-badge" id="qImageBadge" style="display:none">📷 図あり</div>
      </div>
      <div class="no-trans" id="noTransNotice"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-image" id="qImage" style="display:none"></div>
      <div class="q-hint" id="qHint"></div>
      <div class="choices" id="choicesArea"></div>
      <div class="score-area">
        <button class="btn-score" id="btnScore" onclick="scoreQuestion()" disabled>${t('btnScore')}</button>
        <div class="score-msg" id="scoreMsg"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="btnPrev" onclick="goTo(currentIdx-1)">${t('btnPrev')}</button>
        <button class="nav-btn primary" id="btnNext" onclick="goNext()">${t('btnNext')}</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-title" id="res-title">${t('resultTitle')}</div>
      <div class="result-big" id="resBig">—</div>
      <div class="result-sub" id="resSub"></div>
      <div class="result-time" id="resTime"></div>
      <div class="result-grid">
        <div class="result-card"><div class="rc-num c" id="resC">0</div><div class="rc-label" id="res-lbl-c">${t('resultCorrect')}</div></div>
        <div class="result-card"><div class="rc-num w" id="resW">0</div><div class="rc-label" id="res-lbl-w">${t('resultWrong')}</div></div>
        <div class="result-card"><div class="rc-num u" id="resU">0</div><div class="rc-label" id="res-lbl-u">${t('resultUnscored')}</div></div>
      </div>
      <div class="result-review">
        <div class="result-review-header" id="res-review-hdr">${t('reviewHeader')}</div>
        <div class="result-review-list" id="reviewList"></div>
      </div>
      <div class="result-actions">
        <button class="nav-btn primary" id="res-btn-back" onclick="backToQuiz()">${t('btnBack')}</button>
        <button class="nav-btn" id="res-btn-reset" onclick="resetAll()">${t('sbBtnReset')}</button>
        <button class="btn-send" id="btnSend" onclick="sendResult()">${t('btnSend')}</button>
      </div>
      <div class="send-msg" id="sendMsg"></div>
    </div>`;
  document.getElementById('scoreUnanswered').textContent = questions.length;
}

// =============================================
//  RENDER QUESTION
// =============================================
function renderQ(idx) {
  currentIdx = idx;
  const q        = questions[idx];
  const checks   = userChecks[idx];
  const isScored = scored[idx] !== null;

  // 言語に応じたテキスト取得
  const hasEn    = !!(q.text_en && q.choices_en);
  const useEn    = lang === 'en';
  const showText = (useEn && hasEn) ? q.text_en    : q.text;
  const showChoices = (useEn && hasEn) ? q.choices_en : q.choices;

  // 英語未対応の通知
  const noTrans = document.getElementById('noTransNotice');
  if (useEn && !hasEn) {
    noTrans.style.display = 'block';
    noTrans.textContent   = t('noTrans');
  } else {
    noTrans.style.display = 'none';
  }

  document.getElementById('qNumber').textContent =
    `Q ${idx+1} / ${questions.length}　(No.${q.no})`;
  document.getElementById('qText').textContent = showText;
  document.getElementById('qHint').textContent = t('hint', q.select);

  // 画像
  const imgBadge = document.getElementById('qImageBadge');
  const imgArea  = document.getElementById('qImage');
  if (q.image) {
    imgBadge.style.display = 'inline-block';
    imgArea.style.display  = 'block';
    imgArea.innerHTML = `<img src="${IMAGE_DIR}${q.image}" alt="Q${q.no}"
      onerror="this.parentElement.innerHTML='<div class=q-image-placeholder>${t('imgNotFound', q.image)}</div>'">`;
  } else {
    imgBadge.style.display = 'none';
    imgArea.style.display  = 'none';
    imgArea.innerHTML = '';
  }

  // 選択肢
  const area = document.getElementById('choicesArea');
  area.innerHTML = '';
  showChoices.forEach((text, ci) => {
    const num       = ci+1;
    const isChecked = checks.has(num);
    const isCorrect = q.answer.includes(num);
    const div = document.createElement('div');
    div.className = 'choice-item';
    if (isScored) {
      div.classList.add('locked');
      if (isChecked && isCorrect)   div.classList.add('reveal-correct');
      else if (isChecked && !isCorrect) div.classList.add('reveal-wrong');
      else if (!isChecked && isCorrect) div.classList.add('reveal-missed');
    } else {
      if (isChecked) div.classList.add('selected');
      div.addEventListener('click', ()=>toggleCheck(idx, num));
    }
    let iconClass='', iconText='';
    if (isScored) {
      if (isChecked && isCorrect)   { iconClass='ok';   iconText='✓'; }
      else if (isChecked && !isCorrect) { iconClass='ng';   iconText='✗'; }
      else if (!isChecked && isCorrect) { iconClass='miss'; iconText='!'; }
    }
    div.innerHTML = `
      <div class="choice-check">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7l4 4 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="choice-num">${num}</div>
      <div class="choice-text">${text}</div>
      <div class="result-icon ${iconClass} ${isScored?'show':''}">${iconText}</div>`;
    area.appendChild(div);
  });

  // 採点ボタン
  const btnScore = document.getElementById('btnScore');
  const scoreMsg = document.getElementById('scoreMsg');
  if (isScored) {
    btnScore.disabled    = true;
    btnScore.textContent = t('scored');
    const answerTexts = q.answer.map(a=>`${a}「${showChoices[a-1]}」`).join('、');
    scoreMsg.className   = 'score-msg ' + (scored[idx] ? 'correct-msg' : 'wrong-msg');
    scoreMsg.textContent = scored[idx] ? t('correct', answerTexts) : t('wrong', answerTexts);
  } else {
    const ready = checks.size >= q.select;
    btnScore.disabled    = !ready;
    btnScore.textContent = t('btnScore');
    scoreMsg.className   = 'score-msg';
    scoreMsg.textContent = checks.size===0
      ? t('selectMore', q.select)
      : checks.size < q.select
        ? t('selectMoreLeft', q.select - checks.size)
        : '';
  }

  document.getElementById('btnPrev').disabled    = idx===0;
  document.getElementById('btnPrev').textContent = t('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled    = idx===questions.length-1;
  btnNext.textContent = idx===questions.length-1 ? t('btnLast') : t('btnNext');

  updateSidebar();
  updateProgressBar();
}

function toggleCheck(qIdx, num) {
  const q      = questions[qIdx];
  const checks = userChecks[qIdx];
  if (checks.has(num)) { checks.delete(num); }
  else { if (q.select===1) checks.clear(); checks.add(num); }
  renderQ(qIdx);
}

function scoreQuestion() {
  const q      = questions[currentIdx];
  const checks = userChecks[currentIdx];
  scored[currentIdx] = q.answer.length===checks.size && q.answer.every(a=>checks.has(a));
  renderQ(currentIdx);
}

function goNext() {
  if (currentIdx < questions.length-1) { currentIdx++; renderQ(currentIdx); }
}
function goTo(idx) {
  if (idx>=0 && idx<questions.length) renderQ(idx);
}

// =============================================
//  SIDEBAR
// =============================================
function updateSidebar() {
  // 静的テキスト
  const ids = { 'sb-heading':'sbHeading','sb-correct':'sbCorrect','sb-wrong':'sbWrong',
                'sb-unscored':'sbUnscored','sb-btn-result':'sbBtnResult','sb-btn-reset':'sbBtnReset' };
  Object.entries(ids).forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.textContent=t(key); });

  const grid = document.getElementById('qGrid');
  grid.innerHTML='';
  let correct=0,wrong=0,unscored=0;
  questions.forEach((q,i)=>{
    const btn=document.createElement('button');
    btn.className='q-btn'; btn.textContent=i+1; btn.onclick=()=>goTo(i);
    if(i===currentIdx) btn.classList.add('current');
    if(scored[i]===true)  { btn.classList.add('scored-correct'); correct++; }
    else if(scored[i]===false) { btn.classList.add('scored-wrong'); wrong++; }
    else { if(userChecks[i].size>0) btn.classList.add('in-progress'); unscored++; }
    grid.appendChild(btn);
  });
  document.getElementById('scoreCorrect').textContent    = correct;
  document.getElementById('scoreWrong').textContent      = wrong;
  document.getElementById('scoreUnanswered').textContent = unscored;
}

function updateProgressBar() {
  const done = scored.filter(s=>s!==null).length;
  document.getElementById('progressFill').style.width = (done/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${questions.length}`;
}

// =============================================
//  RESULT
// =============================================
function showResult() {
  stopTimer();
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  let correct=0,wrong=0,unscored=0;
  scored.forEach(s=>{ if(s===true)correct++; else if(s===false)wrong++; else unscored++; });
  const pct=Math.round(correct/questions.length*100);
  document.getElementById('resBig').textContent   = `${correct} / ${questions.length}`;
  document.getElementById('resSub').textContent   = lang==='ja' ? `正解率 ${pct}%` : `Score: ${pct}%`;
  document.getElementById('resTime').textContent  = t('resultTime', formatTime(timerSeconds));
  document.getElementById('resC').textContent     = correct;
  document.getElementById('resW').textContent     = wrong;
  document.getElementById('resU').textContent     = unscored;
  document.getElementById('res-title').textContent    = t('resultTitle');
  document.getElementById('res-lbl-c').textContent    = t('resultCorrect');
  document.getElementById('res-lbl-w').textContent    = t('resultWrong');
  document.getElementById('res-lbl-u').textContent    = t('resultUnscored');
  document.getElementById('res-review-hdr').textContent = t('reviewHeader');
  document.getElementById('res-btn-back').textContent  = t('btnBack');
  document.getElementById('res-btn-reset').textContent = t('sbBtnReset');
  document.getElementById('btnSend').textContent       = t('btnSend');

  const list=document.getElementById('reviewList');
  list.innerHTML='';
  questions.forEach((q,i)=>{
    const s=scored[i];
    const statusClass=s===null?'u':s?'c':'w';
    const statusText =s===null?t('statusNone'):s?t('statusOk'):t('statusNg');
    const dispText   =(lang==='en'&&q.text_en)?q.text_en:q.text;
    const row=document.createElement('div');
    row.className='review-row';
    row.innerHTML=`
      <span class="rr-num">Q ${i+1}（No.${q.no}）</span>
      <span class="rr-status ${statusClass}">${statusText}</span>
      <span class="rr-text">${dispText.slice(0,40)}…</span>`;
    row.onclick=()=>{backToQuiz();goTo(i);};
    list.appendChild(row);
  });
}

function backToQuiz() {
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizArea').style.display='block';
  renderQ(currentIdx);
}

function resetAll() {
  if (!confirm(t('confirmReset'))) return;
  location.reload();
}

// =============================================
//  SEND RESULT
// =============================================
function sendResult() {
  const btn=document.getElementById('btnSend');
  const msgArea=document.getElementById('sendMsg');
  if (!confirm(t('confirmSend', userName, studentId))) return;
  btn.disabled=true; btn.textContent=t('sending');
  msgArea.className='send-msg'; msgArea.textContent='';

  const questionResults={};
  questions.forEach((q,i)=>{
    const s=scored[i];
    questionResults[q.no]=s===true?'○':s===false?'×':'未';
  });

  const now=new Date();
  const timestamp=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  let correct=0,wrong=0,unscored=0;
  scored.forEach(s=>{ if(s===true)correct++; else if(s===false)wrong++; else unscored++; });
  const sessionCode=examInfo.session==='午前'?'am':'pm';

  // シンプルPOST送信（全ブラウザ対応）
  // Content-Typeを省略することでtext/plain扱いになりCORSプリフライトが発生しない
  // CORSエラーはレスポンス読み取り時のみ発生し、リクエスト自体は必ず届く
  const payload = {
    timestamp, name:userName, studentId,
    time:formatTime(timerSeconds),
    correct, wrong, unscored,
    rate:Math.round(correct/questions.length*100)+'%',
    round:examInfo.round, session:sessionCode,
    questions:questionResults
  };

  fetch(GAS_URL, {
    method: 'POST',
    body:   JSON.stringify(payload)
  }).catch(() => {}); // CORSエラーは無視（データは届いている）

  // 1秒後に送信完了を表示
  setTimeout(() => {
    btn.textContent=t('btnSent');
    msgArea.className='send-msg ok';
    msgArea.textContent=t('sendOk');
  }, 1000);
}

// ── START ──
loadData();
</script>
