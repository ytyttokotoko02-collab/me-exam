<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME技術実力検定試験</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #7c6af7;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --unanswered: #f39c12;
    --text: #e8eaf6;
    --text-dim: #8890b5;
    --text-muted: #555c7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .topbar-title { font-family: 'Noto Serif JP', serif; font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; max-width: 320px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  /* ── LAYOUT ── */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 57px); }

  /* ── SIDEBAR ── */
  .sidebar { border-right: 1px solid var(--border); padding: 20px 16px; overflow-y: auto; position: sticky; top: 57px; height: calc(100vh - 57px); }
  .sidebar-heading { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; padding-left: 4px; }
  .q-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
  .q-btn { aspect-ratio: 1; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; font-size: 10px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans JP', sans-serif; }
  .q-btn:hover { border-color: var(--accent); color: var(--accent); }
  .q-btn.current { border-color: var(--accent); background: rgba(79,142,247,0.15); color: var(--accent); font-weight: 700; }
  .q-btn.scored-correct { background: rgba(46,204,113,0.15); border-color: var(--correct); color: var(--correct); }
  .q-btn.scored-wrong   { background: rgba(231,76,60,0.15);  border-color: var(--wrong);   color: var(--wrong); }
  .q-btn.in-progress    { border-color: var(--unanswered); color: var(--unanswered); }
  .sidebar-score { margin-top: 20px; padding: 14px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
  .score-row { display: flex; justify-content: space-between; font-size: 15px; color: var(--text-dim); margin-bottom: 6px; }
  .score-row:last-child { margin-bottom: 0; }
  .score-val { font-weight: 700; }
  .score-val.c { color: var(--correct); } .score-val.w { color: var(--wrong); } .score-val.u { color: var(--unanswered); }
  .btn-result { margin-top: 14px; width: 100%; padding: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-result:hover { opacity: 0.85; }
  .btn-reset { margin-top: 8px; width: 100%; padding: 8px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN ── */
  .main { padding: 40px 48px; max-width: 820px; }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .q-number { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 500; }
  .q-image-badge { font-size: 10px; padding: 2px 8px; background: rgba(243,156,18,0.15); border: 1px solid var(--unanswered); border-radius: 10px; color: var(--unanswered); }
  .q-text { font-family: 'Noto Serif JP', serif; font-size: 17px; line-height: 1.9; color: var(--text); margin-bottom: 16px; font-weight: 600; white-space: pre-wrap; }
  .q-image { margin-bottom: 20px; }
  .q-image img { max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }
  .q-image-placeholder { padding: 18px 20px; background: var(--surface2); border: 1px dashed var(--unanswered); border-radius: 10px; font-size: 13px; color: var(--unanswered); display: flex; align-items: center; gap: 10px; }
  .q-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; padding: 8px 14px; background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; }

  /* ── CHOICES ── */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .choice-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.15s; }
  .choice-item.locked { pointer-events: none; }
  .choice-item.reveal-correct { border-color: var(--correct); background: rgba(46,204,113,0.07); }
  .choice-item.reveal-wrong   { border-color: var(--wrong);   background: rgba(231,76,60,0.07); }
  .choice-num { min-width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-dim); flex-shrink: 0; margin-top: 2px; }
  .choice-text { font-size: 17px; line-height: 1.75; color: var(--text); flex: 1; }
  .maru-batu { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; padding-top: 2px; }
  .mb-btn { width: 42px; height: 42px; border-radius: 8px; border: 2px solid var(--border); background: transparent; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans JP', sans-serif; color: var(--text-muted); }
  .mb-btn:hover:not(:disabled) { transform: scale(1.08); }
  .mb-btn.maru:hover:not(:disabled) { border-color: var(--correct); color: var(--correct); }
  .mb-btn.batu:hover:not(:disabled) { border-color: var(--wrong);   color: var(--wrong); }
  .mb-btn.maru.selected { border-color: var(--correct); background: rgba(46,204,113,0.18); color: var(--correct); }
  .mb-btn.batu.selected { border-color: var(--wrong);   background: rgba(231,76,60,0.18);  color: var(--wrong); }
  .mb-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .result-icon { min-width: 32px; height: 32px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; margin-top: 3px; }
  .result-icon.show { display: flex; }
  .result-icon.ok { background: rgba(46,204,113,0.2); color: var(--correct); }
  .result-icon.ng { background: rgba(231,76,60,0.2);  color: var(--wrong); }

  /* ── SCORE BUTTON ── */
  .score-area { margin-bottom: 32px; }
  .btn-score { padding: 12px 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-score:hover:not(:disabled) { opacity: 0.85; }
  .btn-score:disabled { opacity: 0.35; cursor: default; }
  .score-msg { margin-top: 12px; font-size: 19px; color: var(--text-dim); min-height: 24px; line-height: 1.6; }
  .score-msg.correct-msg { color: var(--correct); font-weight: 700; }
  .score-msg.wrong-msg   { color: var(--wrong);   font-weight: 700; }

  /* ── NAV ── */
  .nav-row { display: flex; gap: 12px; align-items: center; }
  .nav-btn { padding: 10px 22px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: #fff; }
  .nav-btn.primary:hover:not(:disabled) { opacity: 0.85; color: #fff; border-color: transparent; }

  /* ── RESULT ── */
  .result-screen { display: none; padding: 40px 48px; max-width: 820px; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .result-title { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 700; margin-bottom: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .result-big { font-size: 64px; font-weight: 700; line-height: 1; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .result-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }
  .result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 36px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .result-card .rc-num { font-size: 36px; font-weight: 700; margin-bottom: 4px; }
  .result-card .rc-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
  .rc-num.c { color: var(--correct); } .rc-num.w { color: var(--wrong); } .rc-num.u { color: var(--unanswered); }
  .result-review { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
  .result-review-header { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 12px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
  .result-review-list { max-height: 320px; overflow-y: auto; }
  .review-row { display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border); gap: 12px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .review-row:last-child { border-bottom: none; }
  .review-row:hover { background: var(--surface2); }
  .review-row .rr-num { color: var(--text-muted); min-width: 60px; }
  .review-row .rr-status { min-width: 40px; font-weight: 700; }
  .review-row .rr-status.c { color: var(--correct); } .review-row .rr-status.w { color: var(--wrong); } .review-row .rr-status.u { color: var(--unanswered); }
  .review-row .rr-text { color: var(--text-dim); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-actions { display: flex; gap: 12px; }

  /* ── LOADING / ERROR ── */
  .screen-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; text-align: center; padding: 40px; }
  .screen-center .icon { font-size: 48px; }
  .screen-center h2 { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--text); }
  .screen-center p { font-size: 14px; color: var(--text-dim); line-height: 1.8; max-width: 480px; }
  .screen-center code { font-size: 12px; background: var(--surface2); padding: 2px 8px; border-radius: 4px; color: var(--accent); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main, .result-screen { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title" id="topbarTitle">ME技術実力検定試験</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">— / —</div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-heading">問題一覧</div>
    <div class="q-grid" id="qGrid"></div>
    <div class="sidebar-score">
      <div class="score-row"><span>正解</span><span class="score-val c" id="scoreCorrect">0</span></div>
      <div class="score-row"><span>不正解</span><span class="score-val w" id="scoreWrong">0</span></div>
      <div class="score-row"><span>未採点</span><span class="score-val u" id="scoreUnanswered">—</span></div>
    </div>
    <button class="btn-result" onclick="showResult()">結果を見る</button>
    <button class="btn-reset" onclick="resetAll()">最初からやり直す</button>
  </aside>

  <div id="mainArea">
    <div class="screen-center" id="loadingScreen">
      <div class="icon">⏳</div>
      <h2>データを読み込み中...</h2>
    </div>
  </div>
</div>

<script>
// =============================================
//  設定: 読み込むJSONファイルのパス
//  同じフォルダに置いたJSONファイル名を指定
// =============================================
const JSON_FILE = 'round46_am.json';
const IMAGE_DIR = 'images/';  // 画像フォルダのパス

// =============================================
//  STATE
// =============================================
let questions  = [];
let userMarks  = [];
let scored     = [];
let currentIdx = 0;
let examInfo   = {};

// =============================================
//  INIT: JSON読み込み
// =============================================
async function loadData() {
  try {
    const res = await fetch(JSON_FILE);
    if (!res.ok) throw new Error(`HTTPエラー: ${res.status}`);
    const data = await res.json();
    examInfo = data.exam || {};
    initQuestions(data.questions);
    document.getElementById('topbarTitle').textContent =
      `第${examInfo.round || '?'}回 第２種ME検定 ${examInfo.session || ''}`;
    renderMainArea();
    renderQ(0);
  } catch(err) {
    showError(err);
  }
}

function showError(err) {
  document.getElementById('mainArea').innerHTML = `
    <div class="screen-center">
      <div class="icon">⚠️</div>
      <h2>データの読み込みに失敗しました</h2>
      <p>
        <code>${JSON_FILE}</code> が見つからないか、読み込めませんでした。<br><br>
        このファイルはWebサーバー上（GitHub Pages等）で動作します。<br>
        ローカルで直接開いた場合はブラウザのセキュリティ制限により読み込めません。<br><br>
        エラー詳細: ${err.message}
      </p>
    </div>`;
}

function renderMainArea() {
  document.getElementById('mainArea').innerHTML = `
    <div class="main" id="quizArea">
      <div class="q-meta">
        <div class="q-number" id="qNumber"></div>
        <div class="q-image-badge" id="qImageBadge" style="display:none">📷 図あり</div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-image" id="qImage" style="display:none"></div>
      <div class="q-hint">各選択肢について ○（正しい）または ×（誤り）を選んでください。正答の選択肢は1つです。</div>
      <div class="choices" id="choicesArea"></div>
      <div class="score-area">
        <button class="btn-score" id="btnScore" onclick="scoreQuestion()" disabled>採点する</button>
        <div class="score-msg" id="scoreMsg"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="btnPrev" onclick="goTo(currentIdx-1)">← 前の問題</button>
        <button class="nav-btn primary" id="btnNext" onclick="goTo(currentIdx+1)">次の問題 →</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-title">結果発表</div>
      <div class="result-big" id="resBig">—</div>
      <div class="result-sub" id="resSub"></div>
      <div class="result-grid">
        <div class="result-card"><div class="rc-num c" id="resC">0</div><div class="rc-label">正解</div></div>
        <div class="result-card"><div class="rc-num w" id="resW">0</div><div class="rc-label">不正解</div></div>
        <div class="result-card"><div class="rc-num u" id="resU">0</div><div class="rc-label">未採点</div></div>
      </div>
      <div class="result-review">
        <div class="result-review-header">問題別結果（クリックで問題へ）</div>
        <div class="result-review-list" id="reviewList"></div>
      </div>
      <div class="result-actions">
        <button class="nav-btn primary" onclick="backToQuiz()">問題に戻る</button>
        <button class="nav-btn" onclick="resetAll()">最初からやり直す</button>
      </div>
    </div>`;
}

// =============================================
//  SHUFFLE & INIT
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function initQuestions(rawQuestions) {
  const order = shuffle(rawQuestions.map((_,i)=>i));
  questions = order.map(idx => {
    const q = rawQuestions[idx];
    const ci = q.choices.map((_,i)=>i);
    const si = shuffle(ci);
    const shuffledChoices = si.map(i=>q.choices[i]);
    const newAnswer = si.indexOf(q.answer-1)+1;
    return { no:q.no, text:q.text, image:q.image||null, choices:shuffledChoices, answer:newAnswer };
  });
  userMarks = questions.map(q => new Array(q.choices.length).fill(null));
  scored    = new Array(questions.length).fill(null);
  currentIdx = 0;
  document.getElementById('scoreUnanswered').textContent = questions.length;
}

// =============================================
//  RENDER
// =============================================
function renderQ(idx) {
  currentIdx = idx;
  const q        = questions[idx];
  const marks    = userMarks[idx];
  const isScored = scored[idx] !== null;

  document.getElementById('qNumber').textContent =
    `問題 ${idx+1} / ${questions.length}　（元番号: 問${q.no}）`;

  document.getElementById('qText').textContent = q.text;

  // 画像
  const imgBadge = document.getElementById('qImageBadge');
  const imgArea  = document.getElementById('qImage');
  if (q.image) {
    imgBadge.style.display = 'inline-block';
    imgArea.style.display  = 'block';
    imgArea.innerHTML = `<img src="${IMAGE_DIR}${q.image}" alt="問${q.no}の図"
      onerror="this.parentElement.innerHTML='<div class=q-image-placeholder>⚠️ 画像ファイルが見つかりません: ${q.image}</div>'">`; 
  } else {
    imgBadge.style.display = 'none';
    imgArea.style.display  = 'none';
    imgArea.innerHTML = '';
  }

  // 選択肢
  const area = document.getElementById('choicesArea');
  area.innerHTML = '';
  q.choices.forEach((text, ci) => {
    const num = ci+1;
    const mark = marks[ci];
    const isCorrectChoice = (num === q.answer);
    const userSaidMaru    = mark === 'maru';
    const shouldBeMaru    = isCorrectChoice;
    const choiceCorrect   = (userSaidMaru === shouldBeMaru);

    const div = document.createElement('div');
    div.className = 'choice-item';
    if (isScored) {
      div.classList.add('locked');
      div.classList.add(choiceCorrect ? 'reveal-correct' : 'reveal-wrong');
    }

    div.innerHTML = `
      <div class="choice-num">${num}</div>
      <div class="choice-text">${text}</div>
      <div class="maru-batu">
        <button class="mb-btn maru ${mark==='maru'?'selected':''}"
          onclick="setMark(${idx},${ci},'maru')"
          ${isScored?'disabled':''}>○</button>
        <button class="mb-btn batu ${mark==='batu'?'selected':''}"
          onclick="setMark(${idx},${ci},'batu')"
          ${isScored?'disabled':''}>×</button>
      </div>
      <div class="result-icon ${isScored?(choiceCorrect?'ok':'ng'):''} ${isScored?'show':''}">${isScored?(choiceCorrect?'✓':'✗'):''}</div>`;
    area.appendChild(div);
  });

  // 採点ボタン
  const btnScore = document.getElementById('btnScore');
  const scoreMsg = document.getElementById('scoreMsg');
  if (isScored) {
    btnScore.disabled = true;
    btnScore.textContent = '採点済み';
    scoreMsg.className = 'score-msg ' + (scored[idx] ? 'correct-msg' : 'wrong-msg');
    scoreMsg.textContent = scored[idx]
      ? `✓ 正解！　正答は選択肢 ${q.answer}「${q.choices[q.answer-1]}」です。`
      : `✗ 不正解　正答は選択肢 ${q.answer}「${q.choices[q.answer-1]}」です。`;
  } else {
    const allMarked = marks.every(m=>m!==null);
    btnScore.disabled    = !allMarked;
    btnScore.textContent = '採点する';
    scoreMsg.className   = 'score-msg';
    scoreMsg.textContent = allMarked ? '' : `あと ${marks.filter(m=>m===null).length} 項目を選んでください`;
  }

  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').disabled = idx===questions.length-1;
  document.getElementById('btnNext').textContent =
    idx===questions.length-1 ? '最後の問題' : '次の問題 →';

  updateSidebar();
  updateProgressBar();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setMark(qIdx, choiceIdx, mark) {
  userMarks[qIdx][choiceIdx] = (userMarks[qIdx][choiceIdx]===mark) ? null : mark;
  renderQ(qIdx);
}

function scoreQuestion() {
  const q = questions[currentIdx];
  const marks = userMarks[currentIdx];
  let allCorrect = true;
  q.choices.forEach((_,ci) => {
    if ((marks[ci]==='maru') !== (ci+1===q.answer)) allCorrect = false;
  });
  scored[currentIdx] = allCorrect;
  renderQ(currentIdx);
}

function goTo(idx) {
  if (idx<0||idx>=questions.length) return;
  renderQ(idx);
}

// =============================================
//  SIDEBAR
// =============================================
function updateSidebar() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  let correct=0, wrong=0, unscored=0;
  questions.forEach((q,i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.textContent = i+1;
    btn.onclick = ()=>goTo(i);
    if (i===currentIdx) btn.classList.add('current');
    if (scored[i]===true)  { btn.classList.add('scored-correct'); correct++; }
    else if (scored[i]===false) { btn.classList.add('scored-wrong'); wrong++; }
    else {
      if (userMarks[i].some(m=>m!==null)) btn.classList.add('in-progress');
      unscored++;
    }
    grid.appendChild(btn);
  });
  document.getElementById('scoreCorrect').textContent   = correct;
  document.getElementById('scoreWrong').textContent     = wrong;
  document.getElementById('scoreUnanswered').textContent = unscored;
}

function updateProgressBar() {
  const done = scored.filter(s=>s!==null).length;
  document.getElementById('progressFill').style.width = (done/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${questions.length}`;
}

// =============================================
//  RESULT
// =============================================
function showResult() {
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  let correct=0, wrong=0, unscored=0;
  scored.forEach(s=>{ if(s===true)correct++; else if(s===false)wrong++; else unscored++; });
  const pct = Math.round(correct/questions.length*100);
  document.getElementById('resBig').textContent = `${correct} / ${questions.length}`;
  document.getElementById('resSub').textContent = `正解率 ${pct}%`;
  document.getElementById('resC').textContent = correct;
  document.getElementById('resW').textContent = wrong;
  document.getElementById('resU').textContent = unscored;
  const list = document.getElementById('reviewList');
  list.innerHTML='';
  questions.forEach((q,i)=>{
    const s=scored[i];
    const statusClass = s===null?'u':s?'c':'w';
    const statusText  = s===null?'未':s?'○':'×';
    const row=document.createElement('div');
    row.className='review-row';
    row.innerHTML=`
      <span class="rr-num">問 ${i+1}（No.${q.no}）</span>
      <span class="rr-status ${statusClass}">${statusText}</span>
      <span class="rr-text">${q.text.slice(0,40)}…</span>`;
    row.onclick=()=>{backToQuiz();goTo(i);};
    list.appendChild(row);
  });
}

function backToQuiz() {
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizArea').style.display='block';
  renderQ(currentIdx);
}

function resetAll() {
  if (!confirm('最初からやり直しますか？\n（問題順・選択肢順が再シャッフルされます）')) return;
  location.reload();
}

// ── START ──
loadData();
</script>
</body>
</html>
